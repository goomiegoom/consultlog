<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Consultation Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Claude-inspired warm light palette */
    --bg:           oklch(0.985 0.004 75);
    --surface-0:    oklch(0.965 0.005 75);
    --surface-1:    oklch(1.000 0.000 0);
    --surface-2:    oklch(0.955 0.006 75);
    --surface-3:    oklch(0.920 0.008 75);
    --border:       oklch(0.910 0.008 75);
    --border-strong:oklch(0.820 0.010 75);
    --text-1:       oklch(0.20 0.010 60);
    --text-2:       oklch(0.40 0.012 60);
    --text-3:       oklch(0.58 0.010 60);
    --accent:       oklch(0.66 0.15 45);     /* warm Claude orange */
    --accent-hover: oklch(0.60 0.16 42);
    --accent-soft:  oklch(0.66 0.15 45 / 0.12);
    --warn:         oklch(0.68 0.14 70);
    --danger:       oklch(0.58 0.20 28);
    --font-sans:    'Inter', -apple-system, system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-1); font-family: var(--font-sans); font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }
  button { font-family: inherit; }
  ::selection { background: var(--accent-soft); color: var(--text-1); }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 6px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
  /* main surface lift in light mode */
  body { background: var(--bg); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
<script type="text/babel" src="consultant.jsx"></script>
<script type="text/babel" src="customer.jsx"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "selectedProjectId": "p1"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [role, setRole] = React.useState("admin");
  const [projects, setProjects] = React.useState(SEED_PROJECTS);
  const [logs, setLogs] = React.useState(SEED_LOGS);
  const [consultants] = React.useState(SEED_CONSULTANTS);
  const [customers] = React.useState(SEED_CUSTOMERS);

  // Per-role identity (mock — would come from auth)
  const currentConsultantId = "c1"; // Anna
  const currentCustomerId = (() => {
    // Pick the customer attached to the selected project, fall back to first
    const proj = projects.find((p) => p.id === t.selectedProjectId);
    if (proj && proj.customers.length > 0) return proj.customers[0];
    return SEED_CUSTOMERS[0].id;
  })();

  // Keep selected project valid as projects change
  React.useEffect(() => {
    if (!projects.find((p) => p.id === t.selectedProjectId) && projects.length > 0) {
      setTweak("selectedProjectId", projects[0].id);
    }
  }, [projects]);

  const setSelectedProjectId = (id) => setTweak("selectedProjectId", id);

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}
         data-screen-label={`Consultation Log · ${role}`}>
      <TopBar role={role} setRole={setRole}
              consultants={consultants} customers={customers}
              currentConsultantId={currentConsultantId}
              currentCustomerId={currentCustomerId} />

      <main style={{
        maxWidth: 1240, width: "100%", margin: "0 auto",
        padding: "32px 32px 64px",
        flex: 1,
      }}>
        {role === "admin" && (
          <AdminView projects={projects} setProjects={setProjects}
            logs={logs} setLogs={setLogs}
            consultants={consultants} customers={customers}
            selectedProjectId={t.selectedProjectId}
            setSelectedProjectId={setSelectedProjectId} />
        )}
        {role === "consultant" && (
          <ConsultantView projects={projects} logs={logs} setLogs={setLogs}
            consultants={consultants} customers={customers}
            currentConsultantId={currentConsultantId}
            selectedProjectId={t.selectedProjectId}
            setSelectedProjectId={setSelectedProjectId} />
        )}
        {role === "customer" && (
          <CustomerView projects={projects} logs={logs}
            consultants={consultants} customers={customers}
            currentCustomerId={currentCustomerId}
            selectedProjectId={t.selectedProjectId}
            setSelectedProjectId={setSelectedProjectId} />
        )}
      </main>

      <TweaksPanel title="Tweaks">
        <TweakSection label="View as" />
        <TweakRadio label="Role" value={role}
          options={[
            { value: "admin", label: "Admin" },
            { value: "consultant", label: "Consultant" },
            { value: "customer", label: "Customer" },
          ]}
          onChange={setRole} />
        <TweakSection label="Active project" />
        <TweakSelect label="Project" value={t.selectedProjectId}
          options={projects.map((p) => {
            const u = projectUsage(p, logs);
            const tag = u.overHours > 0 ? " (over)" : u.pct >= 80 ? " (near limit)" : "";
            return { value: p.id, label: `${p.name}${tag}` };
          })}
          onChange={(v) => setTweak("selectedProjectId", v)} />
        <div style={{ fontSize: 10.5, color: "rgba(41,38,27,.55)", padding: "4px 0 0", lineHeight: 1.4 }}>
          Try “Project Cinder” — it's already over budget so you can see overage states light up.
        </div>
      </TweaksPanel>
    </div>
  );
}

// ── Top bar ──────────────────────────────────────────────────────────────
function TopBar({ role, setRole, consultants, customers, currentConsultantId, currentCustomerId }) {
  const me = role === "admin"
    ? { name: "Admin", role: "Owner" }
    : role === "consultant"
    ? consultants.find((c) => c.id === currentConsultantId)
    : (() => {
        const u = customers.find((c) => c.id === currentCustomerId);
        return { name: u.name, role: u.company };
      })();

  return (
    <header style={{
      borderBottom: "1px solid var(--border)",
      background: "var(--bg)",
      position: "sticky", top: 0, zIndex: 20,
    }}>
      <div style={{
        maxWidth: 1240, margin: "0 auto",
        padding: "12px 32px",
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16,
      }}>
        {/* Logo */}
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{
            width: 26, height: 26, borderRadius: 7,
            background: "var(--accent)",
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            color: "#1a0f08",
          }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="8" cy="8" r="5.5" /><path d="M8 5v3l2 1.5" />
            </svg>
          </div>
          <div style={{ display: "flex", flexDirection: "column", lineHeight: 1.1 }}>
            <span style={{ fontSize: 13, fontWeight: 600, letterSpacing: "-0.01em" }}>Consultation Log</span>
            <span style={{ fontSize: 10, color: "var(--text-3)", textTransform: "uppercase", letterSpacing: ".08em", marginTop: 2 }}>
              v1.0
            </span>
          </div>
        </div>

        {/* Role switcher (segmented) */}
        <div style={{
          display: "inline-flex", padding: 3,
          background: "var(--surface-1)",
          border: "1px solid var(--border)",
          borderRadius: 8, position: "relative",
        }}>
          {[
            { id: "admin", label: "Admin" },
            { id: "consultant", label: "Consultant" },
            { id: "customer", label: "Customer" },
          ].map((r) => (
            <button key={r.id} onClick={() => setRole(r.id)}
              style={{
                position: "relative",
                padding: "6px 14px",
                background: role === r.id ? "var(--surface-3)" : "transparent",
                color: role === r.id ? "var(--text-1)" : "var(--text-3)",
                border: 0, borderRadius: 6,
                fontSize: 12, fontWeight: 500, fontFamily: "inherit",
                cursor: "pointer",
                transition: "background .12s, color .12s",
              }}>
              {r.label}
            </button>
          ))}
        </div>

        {/* User */}
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ textAlign: "right", lineHeight: 1.1 }}>
            <div style={{ fontSize: 12, fontWeight: 500 }}>{me.name}</div>
            <div style={{ fontSize: 10, color: "var(--text-3)", marginTop: 2 }}>{me.role}</div>
          </div>
          <Avatar name={me.name} size={30} />
        </div>
      </div>
    </header>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
